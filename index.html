<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PCG Tours Panel</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="profile">
      <img src="https://i.pravatar.cc/80">
      <h3>Usuario</h3>
    </div>

    <nav>
      <p class="menu-title">Excursiones</p>
      <ul>
        <li onclick="showSection('reservas')">Reservas Confirmadas</li>
        <li onclick="showSection('nueva')">Nueva Reserva</li>
        <li onclick="showSection('excursiones')">Gestión de Excursiones</li>
      </ul>

      <p class="menu-title">Traslados</p>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <input type="text" placeholder="Buscar">
    </header>

    <div class="content">

      <!-- NUEVA RESERVA -->
      <div id="nueva" class="section active">

        <h2 class="title">RESERVA DE EXCURSIÓN</h2>

        <div class="form-grid">

          <div class="card">
            <h4>Información</h4>

            <label>Cliente</label>
            <input id="cliente">

            <label>Hotel</label>
            <input id="hotel">

            <label>Excursión</label>
            <select id="tour"></select>

            <label>Fecha</label>
            <input type="date" id="fecha">

            <label>Adultos</label>
            <input id="adultos" type="number">

            <label>Niños</label>
            <input id="ninos" type="number">

            <label>Descuento</label>
            <input id="descuento" type="number" placeholder="0">

            <label>Total</label>
            <input id="total" readonly>

            <button onclick="guardarReserva()">Guardar</button>
          </div>

        </div>

      </div>

      <!-- RESERVAS -->
      <div id="reservas" class="section">
        <h2 class="title">RESERVAS CONFIRMADAS</h2>
        <div id="lista" class="grid"></div>
      </div>

      <!-- EXCURSIONES -->
      <div id="excursiones" class="section">
        <h2 class="title">GESTIÓN DE EXCURSIONES</h2>

        <!-- CREAR -->
        <div class="card">
          <h4>Nueva Excursión</h4>

          <input id="nombreExcursion" placeholder="Nombre">
          <input id="precioAdulto" type="number" placeholder="Precio Adulto">
          <input id="precioNino" type="number" placeholder="Precio Niño">

          <button onclick="guardarExcursion()">Guardar Excursión</button>
        </div>

        <!-- LISTA DINÁMICA -->
        <div id="listaExcursiones" class="grid"></div>

      </div>

    </div>

  </main>

</div>

</body>
</html>
