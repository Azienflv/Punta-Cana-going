<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PCG Tours Panel</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="profile">
      <img src="https://i.pravatar.cc/80">
      <h3>Usuario</h3>
    </div>

    <nav>
      <p class="menu-title">Excursiones</p>
      <ul>
        <li onclick="showSection('dashboard')">Dashboard</li>
        <li onclick="showSection('reservas')">Reservas Confirmadas</li>
        <li onclick="showSection('nueva')">Nueva Reserva</li>
        <li onclick="showSection('excursiones')">Gestión de Excursiones</li>
      </ul>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <input type="text" placeholder="Buscar">
    </header>

    <div class="content">

      <!-- DASHBOARD -->
      <div id="dashboard" class="section">
        <h2 class="title">DASHBOARD</h2>

        <div class="grid">
          <div class="card">
            <h3>Total Ingresos</h3>
            <h1 id="totalIngresos">0</h1>
          </div>

          <div class="card">
            <h3>Total Reservas</h3>
            <h1 id="totalReservas">0</h1>
          </div>

          <div class="card">
            <h3>Ingresos Hoy</h3>
            <h1 id="ingresosHoy">0</h1>
          </div>
        </div>
      </div>

      <!-- NUEVA RESERVA -->
      <div id="nueva" class="section active">
        <h2 class="title">RESERVA DE EXCURSIÓN</h2>

        <div class="form-grid">
          <div class="card">

            <label>Cliente</label>
            <input id="cliente">

            <label>Hotel</label>
            <input id="hotel">

            <label>Excursión</label>
            <select id="tour"></select>

            <label>Fecha</label>
            <input type="date" id="fecha">

            <label>Adultos</label>
            <input id="adultos" type="number">

            <label>Niños</label>
            <input id="ninos" type="number">

            <label>Descuento</label>
            <input id="descuento" type="number" placeholder="0">

            <label>Total</label>
            <input id="total" readonly>

            <button onclick="guardarReserva()">Guardar</button>
          </div>
        </div>
      </div>

      <!-- RESERVAS -->
      <div id="reservas" class="section">
        <h2 class="title">RESERVAS</h2>
        <div id="lista" class="grid"></div>
      </div>

      <!-- EXCURSIONES -->
      <div id="excursiones" class="section">
        <h2 class="title">EXCURSIONES</h2>

        <div class="card">
          <input id="nombreExcursion" placeholder="Nombre">
          <input id="precioAdulto" type="number" placeholder="Adulto">
          <input id="precioNino" type="number" placeholder="Niño">
          <button onclick="guardarExcursion()">Guardar</button>
        </div>

        <div id="listaExcursiones" class="grid"></div>
      </div>

    </div>
  </main>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "pcg-tours.firebaseapp.com",
  projectId: "pcg-tours"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="app.js"></script>

</body>
</html>
