<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCG Tours Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>PCG Tours - Reservation Panel</h1>

<form id="form">
<input type="text" placeholder="Client Name" id="client">
<input type="text" placeholder="Hotel" id="hotel">

<select id="excursion">
<option>Buggies</option>
<option>Saona</option>
<option>Party Boat</option>
<option>Santo Domingo</option>
<option>Dolphins</option>
<option>Safari</option>
<option>Island Catalina</option>
<option>Domitai</option>
<option>Scape Park</option>
<option>El Dorado Park</option>
<option>Jet Ski</option>
</select>

<input type="number" placeholder="Adults" id="adults">
<input type="number" placeholder="Kids" id="kids">
<input type="number" placeholder="Total Price" id="price">

<button type="submit">Save Reservation</button>

</form>

<script src="app.js"></script>

</body>
</html>
