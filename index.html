<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PCG Tours Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>PCG Tours</h2>
    <ul>
      <li onclick="showSection('reservas')">📋 Lista de Reservas</li>
      <li onclick="showSection('nueva')">➕ Nueva Reserva</li>
      <li>📦 Catálogo</li>
      <li>🚐 Traslados</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <input type="text" placeholder="Buscar...">
    </header>

    <!-- CONTENIDO -->
    <section class="content">

      <!-- NUEVA RESERVA -->
      <div id="nueva" class="section active">

        <h2>Reserva de Excursión</h2>

        <div class="card">
          <h3>Información</h3>

          <input id="cliente" placeholder="Nombre del cliente">
          <input id="hotel" placeholder="Hotel">

          <select id="tour">
            <option>Buggies</option>
            <option>Isla Saona</option>
          </select>

          <input id="adultos" type="number" placeholder="Adultos">
          <input id="ninos" type="number" placeholder="Niños">

          <button onclick="guardarReserva()">Guardar</button>
        </div>

      </div>

      <!-- LISTA -->
      <div id="reservas" class="section">
        <h2>Reservas</h2>
        <div id="lista"></div>
      </div>

    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
