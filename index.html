<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PCG Tours Panel</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="profile">
      <img src="https://i.pravatar.cc/80">
      <h3>Usuario</h3>
    </div>

    <nav>
      <p class="menu-title">Excursiones</p>
      <ul>
        <li onclick="showSection('reservas')">Lista de Reservas</li>
        <li onclick="showSection('nueva')">Nueva Reserva</li>
        <li>Catálogo</li>
        <li>Reservas In House</li>
      </ul>

      <p class="menu-title">Traslados</p>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <input type="text" placeholder="Buscar">
    </header>

    <div class="content">

      <!-- NUEVA RESERVA -->
      <div id="nueva" class="section active">

        <h2 class="title">RESERVA DE EXCURSIÓN</h2>

        <div class="form-grid">

          <div class="card">
            <h4>Información de la Excursión</h4>

            <label>Cliente</label>
            <input id="cliente">

            <label>Hotel</label>
            <input id="hotel">

            <label>Excursión</label>
            <select id="tour">
              <option>Buggies</option>
              <option>Isla Saona</option>
            </select>

            <label>Adultos</label>
            <input id="adultos" type="number">

            <label>Niños</label>
            <input id="ninos" type="number">

            <button onclick="guardarReserva()">Guardar</button>
          </div>

        </div>

      </div>

      <!-- LISTA -->
      <div id="reservas" class="section">
        <h2 class="title">LISTA DE RESERVAS</h2>
        <div id="lista" class="grid"></div>
      </div>

    </div>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
