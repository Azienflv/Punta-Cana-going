<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PCG Tours Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="profile">
      <img src="https://i.pravatar.cc/80">
      <h3>PCG Tours</h3>
    </div>

    <nav>
      <p class="menu-title" onclick="toggleMenu()">Menú ⬇</p>

      <ul id="submenuExcursiones" style="display:block;">
        <li onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</li>
        <li onclick="showSection('nueva')"><i class="fas fa-plus-circle"></i> Nueva Reserva</li>
        <li onclick="showSection('reservas')"><i class="fas fa-list"></i> Reservas</li>
        <li onclick="showSection('excursiones')"><i class="fas fa-map"></i> Excursiones</li>
      </ul>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <input type="text" placeholder="Buscar (próximamente)">
    </header>

    <div class="content">

      <!-- DASHBOARD -->
      <div id="dashboard" class="section">
        <h2>DASHBOARD</h2>

        <div class="grid">
          <div class="card">
            <h3>Total Ingresos</h3>
            <h1 id="totalIngresos">0</h1>
          </div>

          <div class="card">
            <h3>Total Reservas</h3>
            <h1 id="totalReservas">0</h1>
          </div>

          <div class="card">
            <h3>Ingresos Hoy</h3>
            <h1 id="ingresosHoy">0</h1>
          </div>
        </div>
      </div>

      <!-- NUEVA RESERVA -->
      <div id="nueva" class="section active">
        <h2>NUEVA RESERVA</h2>

        <div class="card">
          <input id="cliente" placeholder="Cliente">
          <input id="hotel" placeholder="Hotel">

          <select id="tour"></select>

          <input type="date" id="fecha">

          <input id="adultos" type="number" placeholder="Adultos">
          <input id="ninos" type="number" placeholder="Niños">
          <input id="descuento" type="number" placeholder="Descuento">

          <input id="total" readonly placeholder="Total">

          <button onclick="guardarReserva()">💾 Guardar Reserva</button>
        </div>
      </div>

      <!-- RESERVAS -->
      <div id="reservas" class="section">
        <h2>RESERVAS</h2>
        <div id="lista" class="grid"></div>
      </div>

      <!-- EXCURSIONES -->
      <div id="excursiones" class="section">
        <h2>EXCURSIONES</h2>

        <div class="card">
          <input id="nombreExcursion" placeholder="Nombre">
          <input id="precioAdulto" type="number" placeholder="Adulto">
          <input id="precioNino" type="number" placeholder="Niño">
          <button onclick="guardarExcursion()">Guardar Excursión</button>
        </div>

        <div id="listaExcursiones" class="grid"></div>
      </div>

    </div>

  </main>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "pcg-tours.firebaseapp.com",
  projectId: "pcg-tours"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- TU JS -->
<script src="app.js"></script>

</body>
</html>
